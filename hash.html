<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; }
    body { font-family: monospace; white-space: pre; }
  </style>
</head>
<body>
<script>
  (async () => {
    const params  = new URLSearchParams(window.location.search);
    const value   = params.get("value");
    const algoRaw = (params.get("algo") || "SHA-256").toUpperCase();

    const SUPPORTED = ["SHA-1", "SHA-256", "SHA-384", "SHA-512"];
    const algo      = SUPPORTED.includes(algoRaw) ? algoRaw : "SHA-256";

    let payload;

    if (value === null) {
      payload = {
        success : false,
        error   : "Missing required parameter: value",
        usage   : "?value=<string>[&algo=SHA-1|SHA-256|SHA-384|SHA-512]"
      };
    } else {
      try {
        const encoded = new TextEncoder().encode(value);
        const hashBuf = await crypto.subtle.digest(algo, encoded);
        const hashHex = Array.from(new Uint8Array(hashBuf))
                             .map(b => b.toString(16).padStart(2, "0"))
                             .join("");

        payload = {
          success   : true,
          algorithm : algo,
          hash      : hashHex
        };
      } catch (err) {
        payload = {
          success : false,
          error   : "Hashing failed: " + err.message
        };
      }
    }

    // Wipe the body entirely and inject raw JSON as a plain text node
    document.body.innerHTML = "";
    document.body.appendChild(
      document.createTextNode(JSON.stringify(payload))
    );
  })();
</script>
</body>
</html>
